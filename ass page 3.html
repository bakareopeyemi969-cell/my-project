<!DOCTYPE html>
<html lang="en">
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpg" sizes="32x32" href="ll.jpg">
    <title>Page 3</title>
    <link rel="stylesheet" type="text/css" href="mystyle.css">

    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            padding-bottom: 50PX;
            height: 1OOpx;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 100vh;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            opacity: 0;
            animation: fade 10s infinite;
            z-index: 0;

        }

        .slide1 {
            background: url(ggg.jpg);
            animation-delay: 0s;
        }

        .slide2 {
            background-image: url(nysc.jpg);
            animation-delay: 5s;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgb(255, 255, 255, 0.459);
            z-index: 1;
        }

        .slide .image-text {
            position: absolute;
            bottom: 60px;
            left: 60px;
            color: #c5a46d;
            z-index: 10;
        }

        .slide .image-text h1 {
            font-size: 60px;
            font-weight: 300;
        }

        .go1 {
            font-size: bolder;
            color: #e4ae19;
            font-weight: bolder;
            font-style: normal;
        }

        .go2 {
            font-weight: bolder;
            color: #b71c1c;
            margin-top: -250px;
            gap: 5px;
        }

        @keyframes fade {
            0% {
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            45% {
                opacity: 1;
            }

            55% {
                opacity: 0;
            }

            100% {
                opacity: 0;
            }
        }

        .header1 {
            display: flex;
            top: 70px;
            justify-content: center;
            gap: 10px;
            width: 100%;
            text-align: center;
            position: absolute;
            background: transparent;
            padding: 15px 0;
            z-index: 5;

        }



        .login-box,
        .fotter,
        .header {
            position: relative;
            z-index: 2;
        }

        .title h1 {
            font-size: 14px;
            color: green;
        }

        .login-box {
            max-width: 450px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin-left: 60px auto;
            z-index: 6;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgb(0, 0, 0, 0.1);


        }

        .login-box h3 {
            background: #c8e6c9;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            color: #2e7d32;
            font-weight: bold;
        }

        .login-box label {
            display: block;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .login-box label i {
            margin-right: 5px;
            color: rgba(32, 31, 31, 0.465);

        }

        .input-group {
            position: relative;
            margin-bottom: 15px;

        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: gray;
            font-size: 13px;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .login-box button {
            padding: 10px 30px;
            display: block;
            background: green;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: auto;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #0b3d0b;
            color: white;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
        }
    </style>


</head>

<body>

        <div class="slide slide1">


            <div class="image-text">
                <div class="go1">
                    <h1>SERVICE</h1>
                    <h2>AND HUMILITY</h2>

                </div>

            </div>

        </div>

        <div class="slide slide2">

            <div class="image-text">
                <div class="go2">
                    <h1>
                        NYSC
                    </h1>
                    <h2>INTEGRATION</h2>
                    <h2>SYSTEM</h2>
                </div>
            </div>

            <div class="overlay"></div>
        </div>

        <div class="header1">

        </div>

            </label>

                <input type="email" placeholder="Email Adress" required>

            </div>
            <label>
                <i class="fa fa-lock"></i>Password:
            </label>

            <div class="input-group">
                <input type="password" placeholder="password" required>
            </div>

            <button>Resume</button>

        </div>
